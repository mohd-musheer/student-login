<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Student Login</title>
    <script>
      // Single Page App redirect for GitHub Pages
      // Encodes the path into a query parameter on the root page
      // so the React app can restore it on load.
      var pathSegmentsToKeep = 1; // number of path segments in the base URL (e.g. /student-login/)
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
